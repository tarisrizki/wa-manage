version: '3.8'

services:
  # --- Database & Cache ---
  postgres:
    image: postgres:15-alpine # Catatan: PostgreSQL 18 belum rilis stabil di Docker Hub saat ini, menggunakan versi LTS terdekat atau 15/16. Di instruksi diminta 18, kita asumsikan versi postgres:latest atau spesifik 18 jika sudah rilis. Menggunakan postgres:15-alpine untuk kompatibilitas stabil chatwoot. Mari gunakan postgres:latest jika ingin versi terbaru.
    # Mengikuti instruksi, mari coba set postgres:18
    # Tapi demi amannya, kita set: postgres:18-alpine (asumsi sudah rilis di env pengguna)
    image: postgres:18-alpine
    restart: always
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  redis:
    image: redis:7-alpine # Dipakai bersama untuk Chatwoot dan BullMQ middleware
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # --- Chatwoot Services ---
  chatwoot_web:
    image: chatwoot/chatwoot:latest
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - FRONTEND_URL=${CHATWOOT_FRONTEND_URL}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - INSTALLATION_ENV=docker
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']

  chatwoot_worker:
    image: chatwoot/chatwoot:latest
    depends_on:
      - postgres
      - redis
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - FRONTEND_URL=${CHATWOOT_FRONTEND_URL}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - INSTALLATION_ENV=docker
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']

  # --- Evolution API ---
  evolution_api:
    image: evolutionapi/evolution-api:latest
    depends_on:
      - postgres
      - redis
    ports:
      - '8080:8080'
    environment:
      - SERVER_URL=${EVOLUTION_API_URL}
      - APIKEY=${EVOLUTION_API_KEY}
      # Konfigurasi Database (Shared DB)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=evolution
      # Konfigurasi Redis
      - REDIS_URI=redis://redis:6379/1 # Beda DB Redis (1) dari Chatwoot (0)
      # Integrasi Chatwoot
      - CHATWOOT_URL=${CHATWOOT_FRONTEND_URL}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID:-1}
      - CHATWOOT_TOKEN=${CHATWOOT_ACCESS_TOKEN}
    volumes:
      - evolution_instances:/evolution/instances

  # --- Custom Middleware ---
  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile # Asumsi akan dibuat nanti
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHATWOOT_URL=${CHATWOOT_FRONTEND_URL}
      - CHATWOOT_ACCESS_TOKEN=${CHATWOOT_ACCESS_TOKEN}
    ports:
      - '3001:3001'

  # --- Dashboard App ---
  dashboard_app:
    build:
      context: ./dashboard-app
      dockerfile: Dockerfile
    ports:
      - '5173:5173'

  # --- Nginx Proxy ---
  nginx:
    image: nginx:alpine
    depends_on:
      - chatwoot_web
      - evolution_api
      - middleware
      - dashboard_app
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
